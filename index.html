<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Estoque Apple</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #f3f5f8;
      --color-surface: #ffffff;
      --color-surface-soft: #f7f8fb;
      --color-text: #1d1d1f;
      --color-muted: #65656c;
      --color-border: rgba(11, 34, 57, 0.10);
      --color-primary: #0a84ff;
      --color-primary-strong: #0066d6;
      --color-warning: #ff9f0a;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 16px 40px rgba(15, 35, 54, 0.08);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0b1118;
        --color-surface: #151c26;
        --color-surface-soft: #1b2430;
        --color-text: #f5f7fb;
        --color-muted: #a9b2c2;
        --color-border: rgba(255,255,255,0.12);
        --color-primary: #0a84ff;
        --color-primary-strong: #5ba7ff;
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }
    }

    body {
      font-family: var(--font);
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, rgba(10,132,255,0.12), transparent 40%),
        radial-gradient(circle at top right, rgba(127,84,255,0.12), transparent 30%),
        var(--color-bg);
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: min(1100px, 100%);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(1.1rem, 2vw, 2rem);
    }

    .header {
      display: flex;
      align-items: center;
      gap: .7rem;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 1rem;
      margin-bottom: 1.1rem;
    }
    .app-title { font-size: clamp(1.05rem, 2.5vw, 1.4rem); font-weight: 650; }
    .subtitle { margin-left: auto; font-size: .85rem; color: var(--color-muted); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      margin-bottom: 1rem;
    }

    .btn {
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text);
      padding: .62rem .95rem;
      border-radius: 999px;
      font-size: .9rem;
      cursor: pointer;
      transition: .2s ease;
    }
    .btn:hover { background: var(--color-surface-soft); }
    .btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: white;
    }
    .btn-primary {
      border-radius: 10px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-strong));
      color: white;
      border: none;
      font-weight: 600;
    }
    .btn-sm { padding: .5rem .7rem; font-size: .8rem; border-radius: 10px; }
    .btn-danger { color: #ff453a; border-color: rgba(255,69,58,.45); }

    .section { display: none; }
    .section.visible { display: block; }

    .sec-desc { font-size: .9rem; color: var(--color-muted); margin-bottom: 1rem; }

    .form-wrap {
      max-width: 680px;
      background: var(--color-surface-soft);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: .9rem;
      align-items: end;
    }
    .form-label { display: block; margin-bottom: .42rem; font-size: .82rem; color: var(--color-muted); }

    select, input[type="number"] {
      width: 100%;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text);
      border-radius: 10px;
      padding: .62rem .76rem;
      font-size: .92rem;
    }

    .summary-bar { display: flex; flex-wrap: wrap; gap: .7rem; margin-bottom: 1rem; }
    .metric {
      flex: 1;
      min-width: 120px;
      padding: .8rem .9rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-soft);
    }
    .metric-label { font-size: .78rem; color: var(--color-muted); }
    .metric-value { font-size: 1.35rem; font-weight: 700; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: .8rem;
    }

    .product-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: .8rem;
      display: flex;
      gap: .8rem;
      background: var(--color-surface);
      align-items: flex-start;
    }

    .product-image {
      width: 74px;
      height: 74px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-soft);
      flex-shrink: 0;
    }
    .product-model { font-weight: 650; font-size: .95rem; margin-bottom: .2rem; }
    .product-type { font-size: .72rem; letter-spacing: .05em; text-transform: uppercase; color: var(--color-muted); margin-bottom: .55rem; }
    .qty-pill { font-size: .82rem; border-radius: 999px; padding: .2rem .55rem; background: var(--color-surface-soft); display: inline-flex; }
    .badge { font-size: .65rem; color: var(--color-warning); margin-left: .35rem; }

    .edit-row { display: flex; gap: .45rem; margin-top: .62rem; border-top: 1px solid var(--color-border); padding-top: .55rem; }
    .edit-row input { width: 80px; }

    .empty-state { text-align: center; color: var(--color-muted); padding: 2rem 1rem; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: var(--color-text);
      color: var(--color-surface);
      padding: .62rem .8rem;
      border-radius: 10px;
      opacity: 0;
      transition: .2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>

      </svg>
      <span class="app-title">Controle de Estoque Apple</span>
      <span class="subtitle" id="last-update"></span>
    </div>

    <div class="actions">
      <button class="btn" id="btn-cadastrar" onclick="showSection('cadastrar')">+ Cadastrar produto</button>
      <button class="btn active" id="btn-estoque" onclick="showSection('estoque')">Ver estoque</button>
      <button class="btn" id="btn-editar" onclick="showSection('editar')">Editar estoque</button>
    </div>

    <section id="sec-cadastrar" class="section">
      <p class="sec-desc">Catálogo com modelos Apple lançados a partir de 2018, organizado por categoria e ano.</p>
      <div class="form-wrap">
        <div class="form-grid">
          <div>
            <label class="form-label" for="f-tipo">Tipo de produto</label>
            <select id="f-tipo"></select>
          </div>
          <div>
            <label class="form-label" for="f-modelo">Modelo</label>
            <select id="f-modelo" disabled></select>
          </div>
          <div>
            <label class="form-label" for="f-qty">Quantidade</label>
            <input type="number" id="f-qty" min="1" value="1" />
          </div>
          <div>
            <button class="btn btn-primary" onclick="cadastrar()">Salvar produto</button>
          </div>
        </div>
      </div>
    </section>

    <section id="sec-estoque" class="section visible">
      <div class="summary-bar" id="summary"></div>
      <div class="card-grid" id="estoque-grid"></div>
    </section>

    <section id="sec-editar" class="section">
      <p class="sec-desc">Atualize quantidades ou remova itens cadastrados.</p>
      <div class="card-grid" id="editar-grid"></div>
    </section>
  </main>

        { modelo: "AirPods Pro (2ª geração)", ano: 2022, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/AirPods_Pro_2nd_generation.png/240px-AirPods_Pro_2nd_generation.png" },
        { modelo: "AirPods 4", ano: 2024, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/AirPods_3rd_generation.png/240px-AirPods_3rd_generation.png" },
        { modelo: "AirPods 4 (ANC)", ano: 2024, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/AirPods_3rd_generation.png/240px-AirPods_3rd_generation.png" },
        { modelo: "AirPods Pro 3", ano: 2025, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/AirPods_Pro_2nd_generation.png/240px-AirPods_Pro_2nd_generation.png" }
      ],
      "iMac": [
        { modelo: "iMac 24\" M1", ano: 2021, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/IMac_M1_Blue.png/320px-IMac_M1_Blue.png" },
        { modelo: "iMac M3", ano: 2023, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/IMac_M3.jpg/320px-IMac_M3.jpg" }
      ],
      "Mac mini / Mac Studio": [
        { modelo: "Mac mini (2018)", ano: 2018, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Mac_mini_2018.svg/240px-Mac_mini_2018.svg.png" },
        { modelo: "Mac mini M1", ano: 2020, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mac_mini_M2.png/240px-Mac_mini_M2.png" },
        { modelo: "Mac Studio M1 Max/Ultra", ano: 2022, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Mac_Studio.png/320px-Mac_Studio.png" },
        { modelo: "Mac mini M2", ano: 2023, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Mac_mini_M2.png/240px-Mac_mini_M2.png" },
        { modelo: "Mac mini M4", ano: 2024, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Mac_mini_M4.jpg/320px-Mac_mini_M4.jpg" },
        { modelo: "Mac Studio M4 Max", ano: 2025, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Mac_Studio.png/320px-Mac_Studio.png" }
      ]
    };

    let produtos = [];

    function normalizeModelName(value) {
      return (value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function buildCatalogMap() {
      const map = {};
      Object.entries(PRODUCT_CATALOG).forEach(([tipo, modelos]) => {
        modelos
          .filter((item) => item.ano >= 2018 && item.ano <= CURRENT_YEAR)
          .sort((a, b) => b.ano - a.ano || a.modelo.localeCompare(b.modelo))
          .forEach((item) => {
            map[normalizeModelName(item.modelo)] = { tipo, modelo: item.modelo, ano: item.ano, img: item.img };
          });
      });
      return map;
    }

    const MODEL_LOOKUP = buildCatalogMap();

    function populateTipo() {
      const tipoSel = document.getElementById('f-tipo');
      tipoSel.innerHTML = '<option value="">Selecione o tipo...</option>';
      Object.keys(PRODUCT_CATALOG).sort().forEach((tipo) => {
        const modelosAtivos = PRODUCT_CATALOG[tipo].filter((item) => item.ano >= 2018 && item.ano <= CURRENT_YEAR);
        const opt = document.createElement('option');
        opt.value = tipo;
        opt.textContent = `${tipo} (${modelosAtivos.length} modelos)`;
        tipoSel.appendChild(opt);
      });
    }

    function populateModelos(tipo) {
      const modelSel = document.getElementById('f-modelo');
      modelSel.innerHTML = '<option value="">Selecione o modelo...</option>';
      if (!tipo || !PRODUCT_CATALOG[tipo]) {
        modelSel.disabled = true;
        return;
      }

      const grouped = PRODUCT_CATALOG[tipo]
        .filter((item) => item.ano >= 2018 && item.ano <= CURRENT_YEAR)
        .reduce((acc, item) => {
        if (!acc[item.ano]) acc[item.ano] = [];
        acc[item.ano].push(item);
        return acc;
      }, {});

      Object.keys(grouped).sort((a, b) => b - a).forEach((ano) => {
        const group = document.createElement('optgroup');
        group.label = `Modelos ${ano}`;
        grouped[ano]
          .sort((a, b) => a.modelo.localeCompare(b.modelo))
          .forEach((item) => {
            const opt = document.createElement('option');
            opt.value = item.modelo;
            opt.textContent = item.modelo;
            group.appendChild(opt);
          });
        modelSel.appendChild(group);
      });

      modelSel.disabled = false;
    }

    function card(p, i, edit) {
      const low = p.qty <= 2;
      return `
        <div class="product-card">
          <img class="product-image" src="${p.img || FALLBACK_UNAVAILABLE_IMAGE}" alt="${p.modelo}" loading="lazy" onerror="this.src='${FALLBACK_UNAVAILABLE_IMAGE}'" />
          <div>
            <div class="product-model">${p.modelo}${low && !edit ? '<span class="badge">Estoque baixo</span>' : ''}</div>
            <div class="product-type">${p.tipo} • ${p.ano}</div>
            <div class="qty-pill"><strong>${p.qty}</strong>&nbsp;unid.</div>
            ${edit ? `
            <div class="edit-row">
              <input type="number" min="1" value="${p.qty}" onchange="updateQty(${i}, this.value)" />
              <button class="btn btn-sm btn-danger" onclick="remover(${i})">Remover</button>
            </div>` : ''}
          </div>
        </div>`;
    }

    function renderEstoque() {
      const grid = document.getElementById('estoque-grid');
      const sumEl = document.getElementById('summary');

      if (!produtos.length) {
        sumEl.innerHTML = '';
        grid.innerHTML = '<div class="empty-state">📦 Nenhum produto cadastrado. Use “Cadastrar produto”.</div>';
        return;
      }

      const total = produtos.reduce((s, p) => s + p.qty, 0);
      const tipos = new Set(produtos.map((p) => p.tipo)).size;
      const low = produtos.filter((p) => p.qty <= 2).length;

      sumEl.innerHTML = `
        <div class="metric"><div class="metric-label">Modelos</div><div class="metric-value">${produtos.length}</div></div>
        <div class="metric"><div class="metric-label">Itens em estoque</div><div class="metric-value">${total}</div></div>
        <div class="metric"><div class="metric-label">Categorias</div><div class="metric-value">${tipos}</div></div>
        <div class="metric"><div class="metric-label">Estoque baixo</div><div class="metric-value" style="color:var(--color-warning)">${low}</div></div>
      `;

      grid.innerHTML = produtos.map((p, i) => card(p, i, false)).join('');
    }

    function renderEditar() {
      const grid = document.getElementById('editar-grid');
      if (!produtos.length) {
        grid.innerHTML = '<div class="empty-state">📦 Nenhum produto para editar.</div>';
        return;
      }
      grid.innerHTML = produtos.map((p, i) => card(p, i, true)).join('');
    }

    function showSection(name) {
      ['cadastrar', 'estoque', 'editar'].forEach((s) => {
        document.getElementById('sec-' + s).classList.remove('visible');
        document.getElementById('btn-' + s).classList.remove('active');
      });
      document.getElementById('sec-' + name).classList.add('visible');
      document.getElementById('btn-' + name).classList.add('active');
      if (name === 'estoque') renderEstoque();
      if (name === 'editar') renderEditar();
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function setLastUpdate() {
      const el = document.getElementById('last-update');
      el.textContent = produtos.length ? `${produtos.length} modelo(s) cadastrado(s)` : `Catálogo Apple 2018-${CURRENT_YEAR}`;
    }

    function saveLocal() {
      localStorage.setItem('apple-stock-v3', JSON.stringify(produtos));
      setLastUpdate();
    }

    function loadLocal() {
      try {
        const rawV3 = localStorage.getItem('apple-stock-v3');
        const rawV2 = localStorage.getItem('apple-stock-v2');
        produtos = rawV3 ? JSON.parse(rawV3) : (rawV2 ? JSON.parse(rawV2) : []);
        produtos = produtos.map((p) => {
          const base = MODEL_LOOKUP[normalizeModelName(p.modelo)] || {};
          return {
            tipo: p.tipo || base.tipo || 'Produto',
            modelo: base.modelo || p.modelo,
            ano: p.ano || base.ano || 0,
            qty: p.qty || 1,
            img: (p.img && !p.img.includes('placehold.co')) ? p.img : (base.img || FALLBACK_UNAVAILABLE_IMAGE)
          };
        });
      } catch (_) {
        produtos = [];
      }
    }

    function cadastrar() {
      const tipo = document.getElementById('f-tipo').value;
      const modelo = document.getElementById('f-modelo').value;
      const qty = parseInt(document.getElementById('f-qty').value, 10) || 1;

      if (!tipo) { toast('Selecione o tipo de produto.'); return; }
      if (!modelo) { toast('Selecione um modelo do catálogo.'); return; }
      if (qty < 1) { toast('Quantidade deve ser maior que zero.'); return; }

      const key = normalizeModelName(modelo);
      const base = MODEL_LOOKUP[key];
      const idx = produtos.findIndex((p) => normalizeModelName(p.modelo) === key);

      if (idx >= 0) {
        produtos[idx].qty += qty;
        toast(`Quantidade de "${modelo}" atualizada.`);
      } else {
        produtos.push({ tipo: base.tipo, modelo, ano: base.ano, img: base.img || FALLBACK_UNAVAILABLE_IMAGE, qty });
        toast(`"${modelo}" cadastrado com sucesso.`);
      }

      saveLocal();
      document.getElementById('f-modelo').value = '';
      document.getElementById('f-qty').value = '1';
      renderEstoque();
    }

    function remover(i) {
      const nome = produtos[i].modelo;
      produtos.splice(i, 1);
      saveLocal();
      renderEditar();
      toast(`"${nome}" removido.`);
    }

    function updateQty(i, val) {
      const n = parseInt(val, 10);
      if (n > 0) {
        produtos[i].qty = n;
        saveLocal();
        toast('Quantidade atualizada.');
      }
    }

    document.getElementById('f-tipo').addEventListener('change', (e) => populateModelos(e.target.value));

    populateTipo();
    populateModelos('');
    loadLocal();
    setLastUpdate();
    renderEstoque();
  </script>
</body>
